<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estadísticas - Carta de Porte</title>
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="estadisticas.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <header class="navbar">
    <button class="menu-toggle" id="menuToggle">☰</button>
    <div class="logo">Carta de Porte</div>

    <nav class="nav-links" id="navLinks">
      <a href="dashboard.html">Inicio</a>
      <a href="view.html">Registros</a>
      <a href="estadisticas.html" class="active">Estadísticas</a>
      <a href="filtros.html">Filtros</a>
    </nav>

    <div class="user-info">
      <button id="theme-toggle" style="background:none; border:none; cursor:pointer; font-size:1.2rem;">🌙</button>
      <img id="userPhoto" class="user-photo" src="" alt="Perfil" />
      <span id="userName"></span>
      <button id="logoutBtn" class="btn-danger">Salir</button>
    </div>
  </header>

  <main class="container">
    <div class="kpi-grid">
      <div class="kpi-card highlight-blue">
        <small>Neto Real a Cobrar</small>
        <h2 id="totalNeto">$0</h2>
      </div>
      <div class="kpi-card highlight-green">
        <small>Viajes Realizados</small>
        <h2 id="totalViajes">0</h2>
      </div>
      <div class="kpi-card highlight-darkgreen">
        <small>Comisiones Brutas</small>
        <h2 id="totalGananciaBruta">$0</h2>
      </div>
      <div class="kpi-card highlight-orange">
        <small>Total Adelantos</small>
        <h2 id="totalAdelantos">$0</h2>
      </div>
    </div>

    <div class="stats-grid">
      <div class="chart-card full-width">
        <h3>Comparativa: Bruto vs. Neto</h3>
        <div class="canvas-container">
          <canvas id="chartComparativa"></canvas>
        </div>
        <p class="chart-footer">Muestra la ganancia efectiva tras descontar adelantos.</p>
      </div>

      <div class="chart-card">
        <h3>Viajes por Mes</h3>
        <div class="canvas-container">
          <canvas id="chartMeses"></canvas>
        </div>
      </div>

      <div class="chart-card">
        <h3>Distribución por Cereal</h3>
        <div class="canvas-container">
          <canvas id="chartCereales"></canvas>
        </div>
      </div>

      <div class="chart-card full-width">
        <h3>Tarifa Promedio por Grano</h3>
        <div class="canvas-container">
          <canvas id="chartTarifas"></canvas>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="./firebaseConfig.js"></script>
  <script type="module" src="./auth.js"></script>
  <script type="module" src="../js/stats.js"></script>

  <script>
    // Lógica Hamburguesa
    const menuToggle = document.getElementById('menuToggle');
    const navLinks = document.getElementById('navLinks');
    menuToggle.onclick = () => navLinks.classList.toggle('active');

    // Lógica Modo Oscuro (Persistente)
    const themeBtn = document.getElementById('theme-toggle');
    const setTheme = (theme) => {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      themeBtn.innerText = theme === 'dark' ? '☀️' : '🌙';
    };
    themeBtn.onclick = () => {
      const isDark = localStorage.getItem('theme') === 'dark';
      setTheme(isDark ? 'light' : 'dark');
    };
    setTheme(localStorage.getItem('theme') || 'light');
  </script>
</body>

</html>
